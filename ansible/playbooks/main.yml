- name: Deploy Cloud-1 WordPress Infrastructure
  hosts: webservers
  become: true
  gather_facts: true
  
  pre_tasks:
    - name: Validate target OS
      ansible.builtin.assert:
        that:
          - ansible_distribution == "Ubuntu"
          - ansible_distribution_version is version('20.04', '>=')
        fail_msg: "This playbook requires Ubuntu 20.04 LTS or later"
        success_msg: "OS validated: {{ ansible_distribution }} {{ ansible_distribution_version }}"

  roles:
    - role: common
      tags: [common, base]
    
    - role: docker
      tags: [docker]
    
    - role: security
      tags: [security, firewall]
    
    - role: wordpress
      tags: [wordpress, app]
    
    - role: ssl
      tags: [ssl, https]
