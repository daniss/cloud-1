- name: Install UFW
  ansible.builtin.apt:
    name: ufw
    state: present

- name: Set UFW default policies
  community.general.ufw:
    direction: "{{ item.direction }}"
    policy: "{{ item.policy }}"
  loop:
    - { direction: 'incoming', policy: 'deny' }
    - { direction: 'outgoing', policy: 'allow' }

- name: Allow SSH through UFW
  community.general.ufw:
    rule: allow
    port: "{{ ssh_port }}"
    proto: tcp
    comment: "Allow SSH"

- name: Allow HTTP through UFW
  community.general.ufw:
    rule: allow
    port: '80'
    proto: tcp
    comment: "Allow HTTP"

- name: Allow HTTPS through UFW
  community.general.ufw:
    rule: allow
    port: '443'
    proto: tcp
    comment: "Allow HTTPS"

- name: Enable UFW
  community.general.ufw:
    state: enabled
    logging: 'on'

- name: Allow root SSH login with SSH keys only
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PermitRootLogin'
    line: 'PermitRootLogin prohibit-password'
    validate: 'sshd -t -f %s'
  notify: Restart SSH

- name: Disable password authentication
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PasswordAuthentication'
    line: 'PasswordAuthentication no'
    validate: 'sshd -t -f %s'
  notify: Restart SSH

- name: Enable public key authentication
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PubkeyAuthentication'
    line: 'PubkeyAuthentication yes'
    validate: 'sshd -t -f %s'
  notify: Restart SSH

- name: Check if deploy user authorized_keys exists
  ansible.builtin.stat:
    path: "/home/{{ ansible_user }}/.ssh/authorized_keys"
  register: deploy_user_authorized_keys
  when: ansible_user != 'root'

- name: Ensure root .ssh directory exists
  ansible.builtin.file:
    path: /root/.ssh
    state: directory
    owner: root
    group: root
    mode: '0700'
  when:
    - ansible_user != 'root'
    - deploy_user_authorized_keys.stat.exists

- name: Copy deploy user authorized_keys to root
  ansible.builtin.copy:
    src: "/home/{{ ansible_user }}/.ssh/authorized_keys"
    dest: /root/.ssh/authorized_keys
    owner: root
    group: root
    mode: '0600'
    remote_src: true
  when:
    - ansible_user != 'root'
    - deploy_user_authorized_keys.stat.exists
