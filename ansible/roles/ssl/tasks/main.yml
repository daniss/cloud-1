- name: Check if certificates already exist
  ansible.builtin.stat:
    path: "{{ app_directory }}/certbot/conf/live/{{ domain_name }}/fullchain.pem"
  register: cert_exists
  when: enable_ssl | bool

- name: Create initial nginx config for certificate acquisition
  ansible.builtin.template:
    src: nginx-initial.conf.j2
    dest: "{{ app_directory }}/nginx/conf.d/default.conf"
    mode: '0644'
  when:
    - enable_ssl | bool
    - not cert_exists.stat.exists

- name: Restart nginx for initial config
  ansible.builtin.command: docker compose restart nginx
  args:
    chdir: "{{ app_directory }}"
  when:
    - enable_ssl | bool
    - not cert_exists.stat.exists

- name: Obtain Let's Encrypt certificate
  ansible.builtin.command: >
    docker compose run --rm certbot certonly
    --webroot
    --webroot-path=/var/www/certbot
    --email {{ letsencrypt_email }}
    --agree-tos
    --no-eff-email
    -d {{ domain_name }}
  args:
    chdir: "{{ app_directory }}"
  register: certbot_result
  when:
    - enable_ssl | bool
    - not cert_exists.stat.exists
  failed_when: certbot_result.rc != 0 and "Certificate not yet due for renewal" not in certbot_result.stderr

- name: Ensure self-signed certificate directory exists
  ansible.builtin.file:
    path: "{{ app_directory }}/certbot/conf/live/selfsigned"
    state: directory
    mode: '0755'
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
  when: not enable_ssl | bool

- name: Check if self-signed certificate exists
  ansible.builtin.stat:
    path: "{{ app_directory }}/certbot/conf/live/selfsigned/fullchain.pem"
  register: selfsigned_cert_exists
  when: not enable_ssl | bool

- name: Generate self-signed certificate
  ansible.builtin.command: >
    openssl req -x509 -nodes -newkey rsa:2048
    -keyout {{ app_directory }}/certbot/conf/live/selfsigned/privkey.pem
    -out {{ app_directory }}/certbot/conf/live/selfsigned/fullchain.pem
    -days 365
    -subj /CN={{ ansible_host }}
  args:
    creates: "{{ app_directory }}/certbot/conf/live/selfsigned/fullchain.pem"
  when:
    - not enable_ssl | bool
    - not selfsigned_cert_exists.stat.exists

- name: Update nginx configuration with SSL
  ansible.builtin.template:
    src: "../wordpress/templates/nginx.conf.j2"
    dest: "{{ app_directory }}/nginx/conf.d/default.conf"
    mode: '0644'
  notify: Reload Nginx SSL

- name: Reload nginx with SSL configuration
  ansible.builtin.command: docker compose exec -T nginx nginx -s reload
  args:
    chdir: "{{ app_directory }}"
  ignore_errors: true

- name: Create certificate renewal cron job
  ansible.builtin.cron:
    name: "Renew Let's Encrypt certificates"
    minute: "0"
    hour: "3"
    job: "cd {{ app_directory }} && docker compose run --rm certbot renew --quiet && docker compose exec -T nginx nginx -s reload"
    user: "{{ ansible_user }}"
  when: enable_ssl | bool
