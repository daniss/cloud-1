---
# ===========================================
# Cloud-1 Configuration Variables
# ===========================================

# Docker settings
docker_version: "5:24.0*"
docker_compose_version: "2.24.0"

# Application settings
app_name: "cloud1"
app_directory: "/opt/{{ app_name }}"

# Domain and SSL settings
# Override these in your inventory or via --extra-vars
domain_name: "{{ lookup('env', 'DOMAIN_NAME') | default('localhost', true) }}"
letsencrypt_email: "{{ lookup('env', 'LETSENCRYPT_EMAIL') | default('admin@example.com', true) }}"
enable_ssl: "{{ domain_name != 'localhost' }}"

# MySQL settings
mysql_root_password: "{{ lookup('env', 'MYSQL_ROOT_PASSWORD') | default(lookup('password', '/dev/null chars=ascii_letters,digits length=32'), true) }}"
mysql_database: "{{ lookup('env', 'MYSQL_DATABASE') | default('wordpress', true) }}"
mysql_user: "{{ lookup('env', 'MYSQL_USER') | default('wordpress', true) }}"
mysql_password: "{{ lookup('env', 'MYSQL_PASSWORD') | default(lookup('password', '/dev/null chars=ascii_letters,digits length=32'), true) }}"

# WordPress settings
wordpress_table_prefix: "wp_"

# Security settings
ssh_port: 22
allowed_ports:
  - "{{ ssh_port }}"
  - 80
  - 443

# Timezone
server_timezone: "Europe/Paris"
